// ─── GL setup ─────────────────────────────────────────────────────────────

const canvas = document.getElementById('glcanvas');
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
if (!gl) alert('WebGL not supported — try a modern browser.');

const VERT_SRC = `
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

let program = null;
let uTime = null, uRes = null;
let startTime = performance.now();
let paused = false;
let pausedAt = 0;
let animId = null;

function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    gl.deleteShader(s);
    return null;
  }
  return s;
}

function buildProgram(fragSrc) {
  if (program) gl.deleteProgram(program);
  const vs = compileShader(gl.VERTEX_SHADER, VERT_SRC);
  const fs = compileShader(gl.FRAGMENT_SHADER, fragSrc);
  if (!vs || !fs) return false;

  const p = gl.createProgram();
  gl.attachShader(p, vs);
  gl.attachShader(p, fs);
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(p));
    return false;
  }

  program = p;
  uTime = gl.getUniformLocation(program, 'u_time');
  uRes = gl.getUniformLocation(program, 'u_resolution');

  const posLoc = gl.getAttribLocation(program, 'a_pos');
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  gl.enableVertexAttribArray(posLoc);
  gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);
  return true;
}

function resizeCanvas() {
  const container = document.getElementById('canvas-container');
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
}

function render() {
  if (!program) { animId = requestAnimationFrame(render); return; }
  const elapsed = paused
    ? (pausedAt - startTime) / 1000
    : (performance.now() - startTime) / 1000;

  document.getElementById('time-display').textContent = `t = ${elapsed.toFixed(3)}`;

  gl.useProgram(program);
  if (uTime) gl.uniform1f(uTime, elapsed);
  if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  animId = requestAnimationFrame(render);
}

// ─── Navigation ────────────────────────────────────────────────────────────

let currentIndex = -1;

function buildNav() {
  const nav = document.getElementById('nav');
  const groups = {};
  SIGNALS.forEach((s, i) => {
    if (!groups[s.species]) groups[s.species] = [];
    groups[s.species].push({ s, i });
  });

  for (const [species, items] of Object.entries(groups)) {
    const g = document.createElement('div');
    g.className = 'nav-group';

    const label = document.createElement('div');
    label.className = 'nav-group-label';
    label.textContent = species;
    g.appendChild(label);

    items.forEach(({ s, i }) => {
      const item = document.createElement('div');
      item.className = 'nav-item';
      item.dataset.index = i;
      item.innerHTML = `${s.tag} ${s.utterance.toString().padStart(2,'0')}<div class="concept">${s.concept}</div>`;
      item.addEventListener('click', () => loadSignal(i));
      g.appendChild(item);
    });

    nav.appendChild(g);
  }
}

async function loadSignal(index) {
  if (index === currentIndex) return;
  currentIndex = index;

  // Update nav active state
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.index) === index);
  });

  const sig = SIGNALS[index];

  // Update meta
  document.getElementById('species-label').textContent = sig.species;
  document.getElementById('concept-label').textContent = sig.concept;

  // Update structure
  const structEl = document.getElementById('signal-structure');
  structEl.innerHTML = sig.structure
    .map(line => `<div><strong>→</strong> ${line}</div>`)
    .join('');

  // Load shader
  try {
    const resp = await fetch(sig.file);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const src = await resp.text();
    resizeCanvas();
    buildProgram(src);
    startTime = performance.now();
  } catch (e) {
    console.error('Failed to load shader:', sig.file, e);
  }
}

// ─── Controls ──────────────────────────────────────────────────────────────

document.getElementById('btn-pause').addEventListener('click', function () {
  paused = !paused;
  if (paused) {
    pausedAt = performance.now();
    this.classList.add('active');
    this.textContent = 'resume';
  } else {
    startTime += performance.now() - pausedAt;
    this.classList.remove('active');
    this.textContent = 'pause';
  }
});

document.getElementById('btn-reset').addEventListener('click', () => {
  startTime = performance.now();
  if (paused) pausedAt = startTime;
});

window.addEventListener('resize', () => {
  resizeCanvas();
});

// ─── Boot ──────────────────────────────────────────────────────────────────

buildNav();
resizeCanvas();
render();
loadSignal(0);
</script>
